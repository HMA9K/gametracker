document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x;font-weight:700;padding:11px;border-radius:10px;background:#e5484d;color:#fff;cursor:pointer;\">Ja, reset<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- MISSIES -->\n        <sc-if value=\"{{ showMissies }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:16px 16px 6px;display:flex;align-items:center;justify-content:space-between;\">\n          <p style=\"margin:0;font-size:13.5px;color:#8b93a8;\">{{ mProgressText }}<\u002Fp>\n          <div onclick=\"{{ onToggleHideDone }}\" style=\"font-size:13px;font-weight:500;padding:7px 13px;border-radius:100px;cursor:pointer;{{ mHideStyle }}\">Verberg voltooide<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;padding:6px 16px;\">\n          <sc-for list=\"{{ mItems }}\" as=\"m\" hint-placeholder-count=\"8\">\n            <div style=\"background:#141926;border:1px solid rgba(255,255,255,0.07);border-radius:14px;display:flex;align-items:stretch;gap:11px;padding:13px 14px;{{ m.cardStyle }}\">\n              <div onclick=\"{{ m.onToggle }}\" style=\"width:27px;height:27px;flex:none;border-radius:8px;border:2px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;align-self:center;{{ m.checkStyle }}\">\n                <sc-if value=\"{{ m.done }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#05111f;font-size:15px;font-weight:700;line-height:1;\">✓<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div onclick=\"{{ m.onOpen }}\" style=\"flex:1;min-width:0;cursor:pointer;\">\n                <div style=\"display:flex;align-items:center;gap:8px;\">\n                  <span style=\"font-family:'Sora',sans-serif;font-size:12px;font-weight:700;color:#566177;flex:none;\">{{ m.n }}<\u002Fspan>\n                  <span style=\"font-family:'Sora',sans-serif;font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;{{ m.nameStyle }}\">{{ m.title }}<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"margin:5px 0 8px;font-size:12px;line-height:1.4;color:#8b93a8;\">{{ m.goal }}<\u002Fp>\n                <div style=\"display:flex;flex-wrap:wrap;gap:6px;\">\n                  <span style=\"font-size:11px;font-weight:600;border-radius:6px;padding:3px 8px;{{ m.trophyChipStyle }}\">★ {{ m.trophyChip }}<\u002Fspan>\n                  <sc-if value=\"{{ m.hasColl }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size:11px;font-weight:600;color:#36c6a0;background:rgba(54,198,160,0.12);border-radius:6px;padding:3px 8px;\">◈ {{ m.collChip }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div onclick=\"{{ m.onOpen }}\" style=\"flex:none;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;cursor:pointer;\">\n                <span style=\"font-size:10px;font-weight:600;letter-spacing:0.04em;color:{{ m.typeColor }};background:{{ m.typeBg }};border-radius:6px;padding:4px 8px;\">{{ m.typeLabel }}<\u002Fspan>\n                <div style=\"display:flex;flex-direction:column;align-items:flex-end;gap:4px;\">\n                  <span style=\"font-size:11px;font-weight:600;color:#9aa2b5;font-family:'Sora',sans-serif;\">{{ m.routeText }}<\u002Fspan>\n                  <div style=\"width:52px;height:5px;background:rgba(255,255,255,0.08);border-radius:100px;overflow:hidden;\">\n                    <div style=\"height:100%;width:{{ m.routePct }}%;background:#2b9dff;border-radius:100px;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"font-size:10.5px;color:#566177;line-height:1;\">Walkthrough ›<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding:6px 16px 20px;\">\n          <sc-if value=\"{{ notPendMissions }}\" hint-placeholder-val=\"{{ true }}\">\n            <div onclick=\"{{ onResetMissions }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:500;color:#8b93a8;padding:12px;border:1px solid rgba(255,255,255,0.09);border-radius:12px;cursor:pointer;\">↺ Reset missie- &amp; route-voortgang<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ pendMissions }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:rgba(229,72,77,0.08);border:1px solid rgba(229,72,77,0.32);border-radius:13px;padding:14px 15px;\">\n              <p style=\"margin:0 0 12px;font-size:13px;line-height:1.5;color:#ffb9b9;\">⚠ Alle missie-vinkjes én alle walkthrough-stappen worden gewist. Dit kan niet ongedaan worden gemaakt.<\u002Fp>\n              <div style=\"display:flex;gap:9px;\">\n                <div onclick=\"{{ onResetCancel }}\" style=\"flex:1;text-align:center;font-size:13.5px;font-weight:600;padding:11px;border-radius:10px;background:rgba(255,255,255,0.07);color:#cdd3e0;cursor:pointer;\">Annuleer<\u002Fdiv>\n                <div onclick=\"{{ onResetConfirm }}\" style=\"flex:1;text-align:center;font-size:13.5px;font-weight:700;padding:11px;border-radius:10px;background:#e5484d;color:#fff;cursor:pointer;\">Ja, reset<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- VERZAMELINGEN -->\n        <sc-if value=\"{{ showVerzamel }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:16px 16px 0;\">\n          <p style=\"margin:0 0 4px;font-size:13.5px;line-height:1.5;color:#8b93a8;\">Verzamelobjecten zitten in de zes Open Combat-missies. Tik een missie om de volledige route te openen en af te vinken.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;padding:14px 16px;\">\n          <sc-for list=\"{{ cGroups }}\" as=\"grp\" hint-placeholder-count=\"6\">\n            <div onclick=\"{{ grp.onOpen }}\" style=\"background:#141926;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:15px 16px;cursor:pointer;\">\n              <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;\">\n                <div style=\"min-width:0;\">\n                  <p style=\"margin:0;font-family:'Sora',sans-serif;font-size:15.5px;font-weight:600;\">{{ grp.title }}<\u002Fp>\n                  <p style=\"margin:2px 0 0;font-size:11.5px;color:#8b93a8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ grp.sub }}<\u002Fp>\n                <\u002Fdiv>\n                <span style=\"flex:none;font-size:12px;font-weight:700;color:#2b9dff;font-family:'Sora',sans-serif;\">{{ grp.text }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:6px;background:rgba(255,255,255,0.08);border-radius:100px;overflow:hidden;margin-bottom:12px;\">\n                <div style=\"height:100%;width:{{ grp.pct }}%;background:#36c6a0;border-radius:100px;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px;\">\n                <sc-for list=\"{{ grp.rows }}\" as=\"rw\" hint-placeholder-count=\"4\">\n                  <span style=\"font-size:11.5px;color:#cdd3e0;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:7px;padding:5px 9px;\">{{ rw.label }} <strong style=\"color:#fff;font-family:'Sora',sans-serif;\">{{ rw.text }}<\u002Fstrong><\u002Fspan>\n                <\u002Fsc-for>\n                <span style=\"font-size:11.5px;color:#566177;align-self:center;\">Walkthrough ›<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <!-- eigen items -->\n          <div style=\"background:#141926;border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:15px 16px;\">\n            <p style=\"margin:0 0 12px;font-family:'Sora',sans-serif;font-size:15.5px;font-weight:600;\">Eigen items<\u002Fp>\n            <div style=\"display:flex;flex-direction:column;gap:7px;\">\n              <sc-for list=\"{{ ccItems }}\" as=\"it\" hint-placeholder-count=\"0\">\n                <div style=\"display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;background:rgba(255,255,255,0.03);\">\n                  <div onclick=\"{{ it.onToggle }}\" style=\"width:22px;height:22px;flex:none;border-radius:7px;border:2px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;{{ it.checkStyle }}\">\n                    <sc-if value=\"{{ it.done }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#05111f;font-size:13px;font-weight:700;line-height:1;\">✓<\u002Fspan><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <span style=\"flex:1;font-size:13.5px;{{ it.labelStyle }}\">{{ it.label }}<\u002Fspan>\n                  <span onclick=\"{{ it.onRemove }}\" style=\"font-size:16px;color:#566177;cursor:pointer;padding:0 4px;\">×<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;margin-top:11px;\">\n              <input value=\"{{ draftCollect }}\" oninput=\"{{ onDraftCollect }}\" placeholder=\"Eigen item toevoegen…\" style=\"flex:1;background:#0d1119;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px;color:#eef1f7;font-size:13.5px;outline:none;\">\n              <div onclick=\"{{ onAddCollect }}\" style=\"background:#2b9dff;color:#05111f;font-weight:700;border-radius:10px;padding:10px 16px;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;\">＋<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:0 16px 20px;\">\n          <sc-if value=\"{{ notPendCollect }}\" hint-placeholder-val=\"{{ true }}\">\n            <div onclick=\"{{ onResetCollect }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:500;color:#8b93a8;padding:12px;border:1px solid rgba(255,255,255,0.09);border-radius:12px;cursor:pointer;\">↺ Reset verzamel-voortgang<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ pendCollect }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:rgba(229,72,77,0.08);border:1px solid rgba(229,72,77,0.32);border-radius:13px;padding:14px 15px;\">\n              <p style=\"margin:0 0 12px;font-size:13px;line-height:1.5;color:#ffb9b9;\">⚠ Alle verzamel-vinkjes en je eigen items worden teruggezet. Dit kan niet ongedaan worden gemaakt.<\u002Fp>\n              <div style=\"display:flex;gap:9px;\">\n                <div onclick=\"{{ onResetCancel }}\" style=\"flex:1;text-align:center;font-size:13.5px;font-weight:600;padding:11px;border-radius:10px;background:rgba(255,255,255,0.07);color:#cdd3e0;cursor:pointer;\">Annuleer<\u002Fdiv>\n                <div onclick=\"{{ onResetConfirm }}\" style=\"flex:1;text-align:center;font-size:13.5px;font-weight:700;padding:11px;border-radius:10px;background:#e5484d;color:#fff;cursor:pointer;\">Ja, reset<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- CHECKLIST (custom game) -->\n        <sc-if value=\"{{ showChecklist }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:16px 16px 0;\">\n          <p style=\"margin:0;font-size:13.5px;line-height:1.5;color:#8b93a8;\">Voeg je eigen trofeeën, verzamelobjecten of doelen toe. Tik om af te vinken — alles blijft bewaard.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:14px 16px;\">\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <sc-for list=\"{{ clItems }}\" as=\"it\" hint-placeholder-count=\"0\">\n              <div style=\"display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;background:#141926;border:1px solid rgba(255,255,255,0.07);\">\n                <div onclick=\"{{ it.onToggle }}\" style=\"width:25px;height:25px;flex:none;border-radius:8px;border:2px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;{{ it.checkStyle }}\">\n                  <sc-if value=\"{{ it.done }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#05111f;font-size:14px;font-weight:700;line-height:1;\">✓<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <span style=\"flex:1;font-size:14.5px;{{ it.labelStyle }}\">{{ it.label }}<\u002Fspan>\n                <span onclick=\"{{ it.onRemove }}\" style=\"font-size:18px;color:#566177;cursor:pointer;padding:0 4px;\">×<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ clEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center;padding:34px 0;color:#566177;font-size:13.5px;\">Nog geen items — voeg je eerste hieronder toe.<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;gap:9px;margin-top:12px;\">\n            <input value=\"{{ draftChecklist }}\" oninput=\"{{ onDraftChecklist }}\" placeholder=\"Nieuw item…\" style=\"flex:1;background:#0d1119;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:12px 14px;color:#eef1f7;font-size:14.5px;outline:none;\">\n            <div onclick=\"{{ onAddChecklist }}\" style=\"background:#2b9dff;color:#05111f;font-weight:700;border-radius:12px;padding:0 18px;cursor:pointer;font-size:20px;display:flex;align-items:center;\">＋<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:0 16px 20px;\">\n          <sc-if value=\"{{ notPendChecklist }}\" hint-placeholder-val=\"{{ true }}\">\n            <div onclick=\"{{ onResetChecklist }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:500;color:#8b93a8;padding:12px;border:1px solid rgba(255,255,255,0.09);border-radius:12px;cursor:pointer;\">↺ Reset checklist<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ pendChecklist }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:rgba(229,72,77,0.08);border:1px solid rgba(229,72,77,0.32);border-radius:13px;padding:14px 15px;\">\n              <p style=\"margin:0 0 12px;font-size:13px;line-height:1.5;color:#ffb9b9;\">⚠ Alle vinkjes in je checklist worden teruggezet. Dit kan niet ongedaan worden gemaakt.<\u002Fp>\n              <div style=\"display:flex;gap:9px;\">\n                <div onclick=\"{{ onResetCancel }}\" style=\"flex:1;text-align:center;font-size:13.5px;font-weight:600;padding:11px;border-radius:10px;background:rgba(255,255,255,0.07);color:#cdd3e0;cursor:pointer;\">Annuleer<\u002Fdiv>\n                <div onclick=\"{{ onResetConfirm }}\" style=\"flex:1;text-align:center;font-size:13.5px;font-weight:700;padding:11px;border-radius:10px;background:#e5484d;color:#fff;cursor:pointer;\">Ja, reset<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- NOTITIES -->\n        <sc-if value=\"{{ showNotities }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:18px 16px;\">\n          <p style=\"margin:0 0 10px;font-size:13px;font-weight:500;color:#8b93a8;letter-spacing:0.08em;text-transform:uppercase;\">Notities<\u002Fp>\n          <textarea value=\"{{ notesVal }}\" oninput=\"{{ onNotes }}\" placeholder=\"Schrijf hier je aantekeningen — strategieën, vindplaatsen, herinneringen… Wordt automatisch bewaard.\" style=\"width:100%;height:340px;background:#141926;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;color:#eef1f7;font-size:14.5px;line-height:1.6;resize:none;outline:none;\"><\u002Ftextarea>\n          <div style=\"margin-top:16px;\">\n            <sc-if value=\"{{ notPendGame }}\" hint-placeholder-val=\"{{ true }}\">\n              <div onclick=\"{{ onResetGame }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:500;color:#8b93a8;padding:12px;border:1px solid rgba(255,255,255,0.09);border-radius:12px;cursor:pointer;\">↺ Reset alle voortgang van deze game<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ pendGame }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:rgba(229,72,77,0.08);border:1px solid rgba(229,72,77,0.32);border-radius:13px;padding:14px 15px;\">\n                <p style=\"margin:0 0 12px;font-size:13px;line-height:1.5;color:#ffb9b9;\">⚠ Let op: dit wist <strong>álle<\u002Fstrong> voortgang van deze game — trofeeën, missies, walkthroughs, verzamelingen, eigen items én deze notities. Dit kan niet ongedaan worden gemaakt.<\u002Fp>\n                <div style=\"display:flex;gap:9px;\">\n                  <div onclick=\"{{ onResetCancel }}\" style=\"flex:1;text-align:center;font-size:13.5px;font-weight:600;padding:11px;border-radius:10px;background:rgba(255,255,255,0.07);color:#cdd3e0;cursor:pointer;\">Annuleer<\u002Fdiv>\n                  <div onclick=\"{{ onResetConfirm }}\" style=\"flex:1;text-align:center;font-size:13.5px;font-weight:700;padding:11px;border-radius:10px;background:#e5484d;color:#fff;cursor:pointer;\">Ja, wis alles<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <!-- bottom tab bar -->\n      <div style=\"position:relative;flex:none;z-index:20;background:rgba(13,16,26,0.92);backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,0.08);display:flex;padding:9px 6px 22px;\">\n        <sc-for list=\"{{ tabs }}\" as=\"tb\" hint-placeholder-count=\"5\">\n          <div onclick=\"{{ tb.onClick }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 0;\">\n            <span style=\"font-size:18px;line-height:1;{{ tb.iconStyle }}\">{{ tb.glyph }}<\u002Fspan>\n            <span style=\"font-size:10.5px;font-weight:500;{{ tb.labelStyle }}\">{{ tb.label }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ░░░░░░░░ WALKTHROUGH ░░░░░░░░ -->\n    <sc-if value=\"{{ isWalk }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Walkthrough\" style=\"display:flex;flex-direction:column;min-height:100vh;\">\n      <div style=\"position:sticky;top:0;z-index:20;background:rgba(13,16,26,0.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.07);padding:48px 16px 0;\">\n        <div style=\"display:flex;align-items:center;gap:10px;padding-bottom:12px;\">\n          <div onclick=\"{{ goBackMissions }}\" style=\"width:38px;height:38px;flex:none;border-radius:11px;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;color:#cdd3e0;\">‹<\u002Fdiv>\n          <div style=\"flex:1;min-width:0;\">\n            <p style=\"margin:0;font-family:'Sora',sans-serif;font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ walkTitle }}<\u002Fp>\n            <p style=\"margin:1px 0 0;font-size:11.5px;color:#8b93a8;\">Walkthrough · {{ walkProgressText }}<\u002Fp>\n          <\u002Fdiv>\n          <span style=\"font-size:11px;font-weight:600;color:#2b9dff;background:rgba(43,157,255,0.13);border-radius:7px;padding:5px 9px;font-family:'Sora',sans-serif;\">{{ walkPctLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height:4px;background:rgba(255,255,255,0.08);border-radius:100px;overflow:hidden;margin-bottom:-2px;\">\n          <div style=\"height:100%;width:{{ walkPct }}%;background:linear-gradient(90deg,#2b9dff,#5ab8ff);border-radius:100px;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;padding:18px 16px 60px;\">\n        <p style=\"margin:0 0 14px;font-size:13.5px;line-height:1.5;color:#cdd3e0;\">{{ walkGoal }}<\u002Fp>\n        <image-slot id=\"{{ walkMapId }}\" shape=\"rounded\" radius=\"14\" placeholder=\"Sleep een kaart of screenshot van deze missie\" style=\"width:100%;height:150px;border:1px solid rgba(255,255,255,0.08);border-radius:14px;margin-bottom:16px;\"><\u002Fimage-slot>\n\n        <sc-if value=\"{{ walkHasGoals }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#141926;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:15px 16px;margin-bottom:18px;\">\n            <p style=\"margin:0 0 12px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.06em;color:#9aa2b5;text-transform:uppercase;\">Einddoelen<\u002Fp>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n              <sc-for list=\"{{ walkGoals }}\" as=\"gg\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.03);border-radius:9px;padding:9px 11px;\">\n                  <span style=\"font-size:12px;color:#cdd3e0;\">{{ gg.label }}<\u002Fspan>\n                  <span style=\"font-size:12.5px;font-weight:700;font-family:'Sora',sans-serif;color:{{ gg.color }};\">{{ gg.text }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <p style=\"margin:0 0 10px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#6c768c;font-weight:600;\">Route — in volgorde<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n          <sc-for list=\"{{ walkSteps }}\" as=\"st\" hint-placeholder-count=\"6\">\n            <div style=\"background:#141926;border:1px solid rgba(255,255,255,0.07);border-radius:13px;padding:12px 13px;display:flex;gap:11px;{{ st.cardStyle }}\">\n              <div onclick=\"{{ st.onToggle }}\" style=\"width:24px;height:24px;flex:none;border-radius:7px;border:2px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:2px;{{ st.checkStyle }}\">\n                <sc-if value=\"{{ st.done }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#05111f;font-size:13px;font-weight:700;line-height:1;\">✓<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px;\">\n                  <span style=\"font-size:9.5px;font-weight:700;letter-spacing:0.05em;color:{{ st.kindColor }};background:{{ st.kindBg }};border-radius:5px;padding:3px 7px;\">{{ st.kindLabel }}<\u002Fspan>\n                  <sc-if value=\"{{ st.hasGrid }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:9.5px;font-weight:700;letter-spacing:0.05em;color:#9aa2b5;background:rgba(255,255,255,0.06);border-radius:5px;padding:3px 7px;font-family:'Sora',sans-serif;\">{{ st.grid }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <p style=\"margin:0;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;{{ st.titleStyle }}\">{{ st.title }}<\u002Fp>\n                <sc-if value=\"{{ st.hasWhere }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"margin:5px 0 0;font-size:12px;color:#8b93a8;\"><strong style=\"color:#a7afc0;\">Waar:<\u002Fstrong> {{ st.where }}<\u002Fp><\u002Fsc-if>\n                <p style=\"margin:5px 0 0;font-size:12.5px;line-height:1.5;color:#cdd3e0;\">{{ st.text }}<\u002Fp>\n                <sc-if value=\"{{ st.hasSub }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"margin:6px 0 0;font-size:11.5px;line-height:1.45;color:#7f8aa0;font-style:italic;\">{{ st.sub }}<\u002Fp><\u002Fsc-if>\n                <sc-if value=\"{{ st.hasTrophy }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:rgba(240,193,75,0.1);border:1px solid rgba(240,193,75,0.25);border-radius:8px;padding:5px 9px;\">\n                    <span style=\"width:9px;height:9px;border-radius:50%;background:#f0c14b;flex:none;\"><\u002Fspan>\n                    <span style=\"font-size:11.5px;color:#e8d3a0;\">Trophy: <strong style=\"color:#f2dca8;\">{{ st.trophyName }}<\u002Fstrong><\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <image-slot id=\"{{ st.photoId }}\" shape=\"rounded\" radius=\"9\" placeholder=\"Sleep screenshot van deze plek\" style=\"width:100%;height:104px;border:1px solid rgba(255,255,255,0.08);border-radius:9px;margin-top:10px;\"><\u002Fimage-slot>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <p style=\"margin:18px 2px 8px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#6c768c;font-weight:600;\">Eigen notitie<\u002Fp>\n        <textarea value=\"{{ walkNote }}\" oninput=\"{{ onWalkNote }}\" placeholder=\"Eigen aantekeningen bij deze missie…\" style=\"width:100%;height:92px;background:#141926;border:1px solid rgba(255,255,255,0.08);border-radius:13px;padding:13px;color:#eef1f7;font-size:13.5px;line-height:1.55;resize:none;outline:none;\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.KEY = 'gt_v1';\n    this._data = this.buildData();\n    this._routes = this.buildRoutes();\n    this.state = {\n      view: 'library', gameId: null, tab: 'overzicht', expanded: null, walkMission: null,\n      trFilter: 'all', trQuery: '', mHideDone: false, confirmReset: null,\n      addGameOpen: false, draftGame: '', draftCollect: '', draftChecklist: '',\n      store: this.load(),\n    };\n  }\n\n  GRADE = {\n    platinum: { color: '#bfe3f5', glow: 'rgba(191,227,245,0.6)', label: 'Platina' },\n    gold:     { color: '#f0c14b', glow: 'rgba(240,193,75,0.55)', label: 'Goud' },\n    silver:   { color: '#c4ccd6', glow: 'rgba(196,204,214,0.5)', label: 'Zilver' },\n    bronze:   { color: '#cf8d5a', glow: 'rgba(207,141,90,0.5)', label: 'Brons' },\n  };\n  AREA = {\n    platinum: { label: 'PLAT', color: '#bfe3f5', bg: 'rgba(191,227,245,0.12)' },\n    campaign: { label: 'CAMP', color: '#5ab8ff', bg: 'rgba(43,157,255,0.13)' },\n    open:     { label: 'OCM',  color: '#36c6a0', bg: 'rgba(54,198,160,0.13)' },\n    zombies:  { label: 'MWZ',  color: '#b06bff', bg: 'rgba(176,107,255,0.13)' },\n  };\n  KIND = {\n    supply:   { label: 'SUPPLY BOX',    color: '#5ab8ff', bg: 'rgba(43,157,255,0.13)' },\n    plate:    { label: 'PLATE CARRIER', color: '#cf8d5a', bg: 'rgba(207,141,90,0.14)' },\n    armament: { label: 'ARMAMENT',      color: '#36c6a0', bg: 'rgba(54,198,160,0.13)' },\n    trophy:   { label: 'TROPHY',        color: '#f0c14b', bg: 'rgba(240,193,75,0.14)' },\n    route:    { label: 'ROUTE',         color: '#9aa2b5', bg: 'rgba(255,255,255,0.06)' },\n    finale:   { label: 'FINALE',        color: '#b06bff', bg: 'rgba(176,107,255,0.14)' },\n  };\n  GOALS = {\n    m1: { tr: 1 }, m2: { tr: 2, coll: 'collectibles' }, m3: { tr: 6, coll: '29 items · 5 arm · 2 plates' },\n    m4: { tr: 1 }, m5: { tr: 1 }, m6: { tr: 0 }, m7: { tr: 1, coll: 'collectibles' }, m8: { tr: 1 },\n    m9: { tr: 1, coll: 'collectibles' }, m10: { tr: 2, coll: 'collectibles' }, m11: { tr: 1 },\n    m12: { tr: 1, coll: 'collectibles' }, m13: { tr: 1 }, m14: { tr: 1 }, m15: { tr: 0 },\n  };\n  MGOAL = {\n    m1: 'Bevrijd het hoofddoelwit uit de drijvende gevangenis',\n    m2: 'Beveilig het geheime wapentransport in de haven',\n    m3: 'Schakel de drie reactor-helikopters uit en clear de zone',\n    m4: 'Sluip langs de bewaking en beveilig de payload',\n    m5: 'Infiltreer undercover en steel de keycard van de Majoor',\n    m6: 'Cinematische hijack op Russische Flight 761 — speel Samara',\n    m7: 'Doorzoek de crashlocatie en vecht naar de exfil',\n    m8: 'Onderschep de wapendeal in de stad',\n    m9: 'Bestorm het landhuis van de oligarch',\n    m10: 'Race naar het dak van de wolkenkrabber',\n    m11: 'Sluip door de besneeuwde tundra naar je doel',\n    m12: 'Ontmantel de bommen op de stuwdam',\n    m13: 'Bedien de AC-130 en geef luchtsteun aan het team',\n    m14: 'Jacht op Makarov door Londen — voltooi de campagne',\n    m15: 'Epiloog direct na Trojan Horse',\n  };\n\n  buildData() {\n    const T = (id, name, grade, area, desc) => ({ id, name, grade, area, desc });\n    const trophies = [\n      T('platinum', \"A Soldier's Purpose\", 'platinum', 'platinum', 'Verzamel alle trofeeën.'),\n      // Campagne\n      T('never_bury', 'Never Bury Your Enemies Alive', 'gold', 'campaign', 'Voltooi de campagne.'),\n      T('veteran', '141 Ready', 'gold', 'campaign', 'Voltooi de campagne op Veteran.'),\n      T('death_row', 'Death Row', 'bronze', 'campaign', 'Dood 12 vijanden tijdens het afdalen in de panopticon — Operation 627.'),\n      T('floater', 'Floater', 'bronze', 'campaign', 'Parachuteer van een kraan op het dak van het Harbormaster-gebouw — Precious Cargo.'),\n      T('helo', 'Helo Hat Trick', 'bronze', 'campaign', 'Vernietig elke doelhelikopter met een ander Armament — Reactor.'),\n      T('twofer', '2-fer', 'bronze', 'campaign', 'Dood met de EBR-14 twee vijanden met één kogel, 5×, zonder alarm — Payload.'),\n      T('back_field', 'Back in the Field', 'bronze', 'campaign', 'Bemachtig de keycard van de Majoor binnen 90s ongezien — Deep Cover.'),\n      T('shot_blocked', 'Shot Blocked', 'bronze', 'campaign', 'Schiet het wapen uit de lucht voordat een terrorist het vangt — Flashpoint.'),\n      T('notice', \"Think She'll Notice?\", 'bronze', 'campaign', 'Vernietig alle auto’s in de garage van het landhuis — Oligarch.'),\n      T('elevator', 'Elevator Out of Order', 'bronze', 'campaign', 'Bereik het dak binnen 45 seconden — Highrise.'),\n      T('snow_angel', 'Snow Angel', 'bronze', 'campaign', 'Voer de bos-sniper uit met een takedown — Frozen Tundra.'),\n      T('hitchhiker', 'Hitchhiker', 'bronze', 'campaign', 'Ontmantel de bom op de rijdende truck — Gora Dam.'),\n      T('tax', 'Your tax dollars at work', 'bronze', 'campaign', 'Schakel met een raket één enkele vijand uit — Danger Close.'),\n      // Open Combat\n      T('gearhead', 'Gearhead', 'gold', 'open', 'Verzamel alle wapens en field upgrades uit Supply Boxes in Open Combat-missies.'),\n      T('no_too_many', 'No Such Thing as Too Many', 'silver', 'open', 'Vind en gebruik alle Armaments in Open Combat-missies.'),\n      T('dialed_in', 'Dialed In', 'bronze', 'open', 'Pas je loadout aan in elke Open Combat-missie.'),\n      T('sample_platter', 'Sample Platter', 'bronze', 'open', 'Gebruik 5 verschillende Armaments in Open Combat-missies.'),\n      T('shotgun', 'I Call Shotgun!', 'bronze', 'open', 'Rijd met een voertuig met Sentry Gun en laat het 5 vijanden doden.'),\n      T('tag', \"Tag, You're It!\", 'bronze', 'open', 'Tag 60 vijanden of items met de Spotter Scope in Open Combat-missies.'),\n      T('bulletproof', 'Bulletproof', 'bronze', 'open', 'Vind alle Plate Carrier Upgrades in Open Combat-missies.'),\n      T('shock', 'Have You Tried Turning it Off and On?', 'bronze', 'open', 'Schakel een vijandelijke Sentry Gun uit met een Shock Stick.'),\n      T('mortar', \"That's One Way to Do It…\", 'bronze', 'open', 'Vernietig een vijandelijke helikopter in de lucht met een Mortar Strike.'),\n      T('catch', 'Hey, Catch!', 'bronze', 'open', 'Raak een vijand direct met een brandbaar vat en blaas het op.'),\n      T('flyer', 'Frequent Flyer', 'bronze', 'open', 'Base-jump en reis meer dan 150m met je parachute.'),\n      T('highwire', 'High Wire Act', 'bronze', 'open', 'Dood 10 vijanden terwijl je een zipline gebruikt.'),\n      // Zombies\n      T('first_step', 'The First Step', 'gold', 'zombies', 'Bereik level 55.'),\n      T('one_against_all', 'One Against All', 'gold', 'zombies', 'Versla Orcus in een 6-mans squad.'),\n      T('seeing_red', 'Seeing Red', 'silver', 'zombies', 'Voltooi 5 contracts in de High Threat Zone in één deployment.'),\n      T('the_end', 'The End?', 'silver', 'zombies', 'Voltooi Act III in MWZ.'),\n      T('slaughterhouse', 'Slaughterhouse', 'silver', 'zombies', 'Dood 50.000 vijanden in MWZ.'),\n      T('conqueror', 'Conqueror', 'silver', 'zombies', 'Versla een Warlord in MWZ.'),\n      T('begins', 'And So It Begins', 'bronze', 'zombies', 'Exfil succesvol uit MWZ.'),\n      T('write_off', 'Write Off', 'bronze', 'zombies', 'Dood 500 vijanden met een Insured Weapon in MWZ.'),\n      T('perkaholic', 'Perkaholic', 'bronze', 'zombies', 'Heb 9 perks tegelijk actief in MWZ.'),\n      T('gravestone', 'Gravestone', 'bronze', 'zombies', 'Dood 100 zombies met een voertuig in één deployment.'),\n      T('back_dead', 'Back from the Dead', 'bronze', 'zombies', 'Haal je gear terug van een Tombstone in MWZ.'),\n      T('helpful', 'Helpful Stranger', 'bronze', 'zombies', 'Revive een speler uit een andere squad.'),\n      T('petdog', 'You Can Pet The Dog', 'bronze', 'zombies', 'Aai een Hellhound in MWZ.'),\n      T('hired', 'Hired Gun', 'bronze', 'zombies', 'Voltooi 20 contracts in MWZ.'),\n    ];\n\n    const M = (id, n, title, type, loc, note, trophyName) => ({ id, n, title, type, loc, note, trophyName });\n    const missions = [\n      M('m1', '01', 'Operation 627', 'linear', 'Drijvende gevangenis', 'Bevrijd het doelwit uit een drijvende gevangenis. Veel verticaliteit — je rappelt langs het binnenplein (de panopticon). Pak hier onderweg 12 kills tijdens het afdalen voor een trofee.', 'Death Row'),\n      M('m2', '02', 'Precious Cargo', 'open', 'Haven · Urzikstan', 'Stel een geheim wapentransport veilig in de haven. Open missie: kies je eigen route. Klim op de kraan en spring met je parachute op het dak van het Harbormaster-gebouw voor de trofee.', 'Floater'),\n      M('m3', '03', 'Reactor', 'open', 'Reactorcomplex', 'Schakel de doelhelikopters uit — gebruik voor élke heli een ánder Armament om de trofee te halen. Verken het terrein voor Supply Boxes en Armaments.', 'Helo Hat Trick'),\n      M('m4', '04', 'Payload', 'linear', 'Raketbasis · Urzikstan', 'Sluipmissie. Lijn vijanden op en dood er met de EBR-14 twee met één kogel — vijf keer, zonder het alarm te activeren.', '2-fer'),\n      M('m5', '05', 'Deep Cover', 'linear', 'Kastoviaanse basis', 'Undercover infiltratie. Bemachtig de keycard van de Majoor binnen 90 seconden, volledig ongezien, voor de trofee.', 'Back in the Field'),\n      M('m6', '06', 'Passenger', 'linear', 'Vlucht 761 → Sochi', 'Cinematische hijack — speel Samara. Geen collectibles of trofee; speel het verhaal uit.', ''),\n      M('m7', '07', 'Crash Site', 'open', 'Crashlocatie', 'Open missie rond een neergestort toestel. Pas je loadout aan (telt mee voor Dialed In) en speur naar Armaments en Supply Boxes.', ''),\n      M('m8', '08', 'Flashpoint', 'linear', 'Stedelijk gebied', 'Schiet het wapen uit de lucht vóórdat een terrorist het opvangt voor de trofee.', 'Shot Blocked'),\n      M('m9', '09', 'Oligarch', 'open', 'Landhuis', 'Open missie op een landgoed. Vernietig álle auto’s in de garage van het landhuis voor de trofee.', \"Think She'll Notice?\"),\n      M('m10', '10', 'Highrise', 'open', 'Wolkenkrabber', 'Open missie in een toren. Haast je naar het dak binnen 45 seconden voor de trofee; gebruik liften en ziplines slim.', 'Elevator Out of Order'),\n      M('m11', '11', 'Frozen Tundra', 'linear', 'Besneeuwd bos', 'Sluipmissie in de sneeuw. Voer de bos-sniper uit met een stille takedown voor de trofee.', 'Snow Angel'),\n      M('m12', '12', 'Gora Dam', 'open', 'Stuwdam', 'Laatste Open Combat-missie — 21 verborgen items. Ontmantel de bommen en defuse de bom op de truck terwijl die rijdt voor de trofee.', 'Hitchhiker'),\n      M('m13', '13', 'Danger Close', 'linear', 'Militaire basis', 'Bedien het AC-130-gunship en dek het team. Gebruik een raket om één enkele vijand uit te schakelen voor de trofee.', 'Your tax dollars at work'),\n      M('m14', '14', 'Trojan Horse', 'linear', 'Londen', 'Finale: je speelt als Soap, Ghost én Price. Volg de CCTV-aanwijzingen naar de schuilplaats en de Channel Tunnel. Voltooit de campagne.', 'Never Bury Your Enemies Alive'),\n      M('m15', '15', 'Countdown', 'linear', 'Londen', 'Afsluitende title-card-missie direct na Trojan Horse die het verhaal afrondt.', ''),\n    ];\n\n    const ocm = [\n      { id: 'pc', title: 'Precious Cargo', sub: 'Open Combat · Haven' },\n      { id: 're', title: 'Reactor', sub: 'Open Combat · Reactorcomplex' },\n      { id: 'cs', title: 'Crash Site', sub: 'Open Combat · Crashlocatie' },\n      { id: 'ol', title: 'Oligarch', sub: 'Open Combat · Landhuis' },\n      { id: 'hr', title: 'Highrise', sub: 'Open Combat · Wolkenkrabber' },\n      { id: 'gd', title: 'Gora Dam', sub: 'Open Combat · Stuwdam' },\n    ];\n    const collectGroups = ocm.map(o => ({\n      id: o.id, title: o.title, sub: o.sub,\n      items: [\n        { id: o.id + '_arm', label: 'Alle Armaments gevonden', target: 'set' },\n        { id: o.id + '_box', label: 'Supply Boxes (wapens & field upgrades)', target: 'set' },\n        { id: o.id + '_plate', label: 'Plate Carrier Upgrade', target: '1' },\n      ],\n    }));\n\n    const builtinGames = [\n      { id: 'mw3', title: 'Modern Warfare III', sub: '2023 · Sledgehammer Games', platform: 'PS5', type: 'mw3', accent: '#2b9dff' },\n      { id: 'er', title: 'Elden Ring', sub: 'Voeg je voortgang toe', platform: 'PS5', type: 'custom', accent: '#d8a23a' },\n      { id: 'gow', title: 'God of War Ragnarök', sub: 'Voeg je voortgang toe', platform: 'PS5', type: 'custom', accent: '#c44a3f' },\n    ];\n\n    return { trophies, missions, collectGroups, builtinGames };\n  }\n\n  buildRoutes() {\n    const S = (kind, title, opts) => Object.assign({ kind, title }, opts || {});\n    const r = {};\n    r.m1 = [\n      S('route', 'Infiltreer de gevangenis', { text: 'Volg het team naar binnen en werk je naar het centrale cellenblok (de panopticon).' }),\n      S('trophy', 'Death Row', { where: 'Tijdens het afdalen door de panopticon', text: 'Houd je wapen klaar. Terwijl je langs het ronde cellenblok naar beneden zakt, schiet je 12 vijanden uit tijdens het dalen.', trophy: 'death_row' }),\n      S('finale', 'Bevrijd het doelwit en exfil', { text: 'Reken af met de resterende bewaking en bereik de extractie.' }),\n    ];\n    r.m2 = [\n      S('route', 'Open de eerste Loadout Crate', { text: 'Bevestig een loadout. Dit registreert Precious Cargo voor Dialed In.' }),\n      S('trophy', 'I Call Shotgun!', { where: 'Voertuig met Sentry Gun', text: 'Monteer een Sentry Gun op de laadbak/het dak van een voertuig en rijd langzaam langs groepen tot de turret 5 kills heeft.', trophy: 'shotgun' }),\n      S('trophy', 'Floater', { where: 'Gantry Crane → Harbormaster-gebouw', text: 'Klim op de havenkraan (Gantry Crane) en parachuteer vandaar precies op het dak van het Harbormaster-gebouw.', trophy: 'floater' }),\n      S('armament', 'Alle Armaments', { text: 'Vind en gebruik elk Armament op de map (telt mee voor No Such Thing as Too Many en Sample Platter).' }),\n      S('supply', 'Alle Supply Boxes', { text: 'Verzamel alle wapens & field upgrades uit de oranje kisten (telt mee voor Gearhead).' }),\n      S('plate', 'Plate Carrier Upgrades', { text: 'Vind alle Plate Carrier-vesten op de map (telt mee voor Bulletproof).' }),\n      S('finale', 'Voltooi objectives en exfil', { text: 'Rond de missiedoelen af en bereik de extractie.' }),\n    ];\n    r.m3 = [\n      S('trophy', 'High Wire Act', { grid: 'GRID D4', where: 'Direct na de parachutesprong', text: 'Land op het dak achter de westelijke objective-helikopter. Glijd herhaaldelijk heen en weer over de zipline en maak in totaal 10 kills tijdens het glijden (auto-wapen of RGL-80). Kills mogen over meerdere ritten.', trophy: 'highwire' }),\n      S('route', 'Dialed In + Shock Stick', { grid: 'GRID D5', where: 'Eerste Loadout Crate', text: 'Open de eerste Loadout Crate op de westelijke route, bevestig een loadout en kies een Shock Stick als tactical. Zo registreer je Reactor voor Dialed In en ben je klaar voor de Sentry Gun in G6.' }),\n      S('supply', '1/29 Silenced Holger 556', { grid: 'GRID A1', text: 'Klim op het dak van het noordwestelijke gebouw en laat je door de dakopening naar binnen vallen. De oranje kist staat binnen.', sub: 'Stille allround AR, zeer stabiel op middellange afstand. AR 4/5.' }),\n      S('supply', '2/29 Incendiary MCW', { grid: 'GRID B2', text: 'Gebruik de ascender aan de zuidkant van het grote magazijn. De kist staat op het dak naast de airdrop.', sub: 'Nauwkeurige AR met brandmunitie. AR 4/5.' }),\n      S('armament', 'Stealth Bomber', { grid: 'GRID B2', where: 'Naast de MCW op het dak', text: 'Pak op en activeer eenmaal op een lange open strook (telt voor No Such Thing as Too Many). Vertrouw er niet op voor Helo Hat Trick.' }),\n      S('supply', '3/29 Incendiary Sakin MG38', { grid: 'GRID C5', text: 'Ga via de trap naast de ascenderlijn naar de tweede verdieping. De kist staat boven direct links.', sub: 'Zware LMG met groot magazijn, trager in bediening. LMG 4/5.' }),\n      S('armament', 'SAM Turret', { grid: 'GRID C5', where: 'Yard links van het startgebied', text: 'Pak op en plaats eenmaal. Uniek Reactor-armament, vooral tegen vliegende doelen.' }),\n      S('route', 'Mortar Strike markeren', { grid: 'GRID C5', where: 'Zelfde yard als de SAM Turret', text: 'Onthoud deze pickup en laat hem voorlopig liggen. Je gebruikt hem later voor de westelijke heli en daarna voor de vliegende armored helicopter.' }),\n      S('supply', '4/29 KV Inhibitor', { grid: 'GRID C6', text: 'Gebruik een ascender om de radiotoren te beklimmen. De kist staat bovenop.', sub: 'Sniper met snelle vervolgschoten. Sniper 3/5.' }),\n      S('supply', '5/29 Minigun', { grid: 'GRID D6', text: 'Ga naar de sniper room boven in de brandweerkazerne. Gooi een frag door het gat in de vloer om het puin bij de deur beneden op te blazen, ga dan naar de begane grond.', sub: 'Extreem krachtig tegen groepen en helikopters, maar zwaar. Special 5/5.' }),\n      S('supply', '6/29 Snapshot Pulse', { grid: 'GRID D6', text: 'De kist staat naast de ascender in het zuidwestelijke gebouwengebied.', sub: 'Toont vijanden tijdelijk door dekking. Gadget 4/5.' }),\n      S('plate', 'Plate Carrier Upgrade 1', { grid: 'GRID D6', where: 'Westelijke sector bij de ascender', text: 'Controleer het gebouw/dak direct ten zuiden van de eerste objective-helikopter en de ascender-zone. Pak het vest op — je armorcapaciteit stijgt met één slot.' }),\n      S('supply', '7/29 RGL-80', { grid: 'GRID D5', text: 'Bij de westelijke objective-helikopter staat de kist direct achter de heli.', sub: 'Granaatwerper, zeer sterk tegen dicht opeen staande vijanden. Launcher 4/5.' }),\n      S('supply', '8/29 Silenced COR-45', { grid: 'GRID D5', text: 'Klim via dozen en steigers naar de kleine kist op de scaffolding bij het westelijke objectivegebied.', sub: 'Stil, beheersbaar zijwapen. Pistol 3/5.' }),\n      S('plate', 'Plate Carrier Upgrade 2', { grid: 'GRID D5', where: 'Begane grond naast de zuidwestelijke heli-zone', text: 'Ga het gebouw naast de zuidwestelijke objective-helikopter in; het vest ligt op de begane grond. Na beide upgrades toont Reactor Armor Slots x3.' }),\n      S('supply', '9/29 Silenced Expedite 12', { grid: 'GRID E4', text: 'De kist staat hoog op de muur. Gebruik de zipline vanaf de tegenoverliggende steiger of parkour via de muren.', sub: 'Stille shotgun voor kamers en korte afstand. Shotgun 3/5.' }),\n      S('supply', '10/29 Heartbeat Sensor', { grid: 'GRID E4', text: 'Zoek de kleine oranje kist naast de ascenderlijn die naar de kraan leidt.', sub: 'Toont nabije vijanden door muren. Gadget 4/5.' }),\n      S('supply', '11/29 HCR 56', { grid: 'GRID E5', text: 'Op de begane grond van de centrale bouwplaats, tussen betonblokken en kratten.', sub: 'Mobiele, nauwkeurige LMG met goede balans. LMG 4/5.' }),\n      S('supply', '12/29 Incendiary Haymaker', { grid: 'GRID E5', text: 'Direct naast de HCR 56 op de begane grond van dezelfde bouwplaats.', sub: 'Snelvurende shotgun, sterke druk op korte afstand. Shotgun 4/5.' }),\n      S('supply', '13/29 Incendiary FJX Imperium', { grid: 'GRID F5', text: 'Gebruik een ascender naar de top van de hoge kraan. De kist staat op het hoogste punt.', sub: 'Zeer hoge single-shot schade — een van de sterkste langeafstandswapens. Sniper 5/5.' }),\n      S('supply', '14/29 Munitions Box', { grid: 'GRID F5', text: 'Op de bouwplaats staat een kleine kist naast een UAV-armament.', sub: 'Vult munitie en equipment aan. Praktisch voor een lange route. Gadget 5/5.' }),\n      S('supply', '15/29 Sidewinder', { grid: 'GRID F4/F5', text: 'Bereik het dak van het noordelijke magazijn via een ascender of via dozen en lage daken. De kist staat boven.', sub: 'Hard-hitting battle rifle met merkbare recoil. Battle rifle 4/5.' }),\n      S('armament', 'Cruise Missile ophalen', { grid: 'GRID F4', where: 'Supply pickup westelijk van de zuidoostelijke sector', text: 'Pak op en bewaar voor de zuidoostelijke objective-helikopter. Activeer pas wanneer je die heli duidelijk in beeld hebt.' }),\n      S('supply', '16/29 Silenced VEL 46', { grid: 'GRID F6', text: 'Klim via de ladder aan de zijkant naar het dak. De kist staat boven.', sub: 'Mobiele, stille SMG met beheersbare recoil. SMG 4/5.' }),\n      S('supply', '17/29 Armor Box', { grid: 'GRID F6', text: 'Ga langs de oostzijde van het kleine kantoor. Schiet door het raam de stoel weg die de deur blokkeert en ga naar binnen.', sub: 'Levert extra armor plates. Zeer nuttig op Veteran. Gadget 5/5.' }),\n      S('trophy', 'I Call Shotgun! (optioneel)', { grid: 'GRID F6', where: 'Sentry Gun bij het kleine kantoor', text: 'Pak de Sentry Gun bij het Armor Box-kantoor, plaats hem op een pickup en rijd langzaam langs groepen tot de turret 5 kills heeft. Heb je deze al in Precious Cargo, sla over.', trophy: 'shotgun' }),\n      S('armament', 'VTOL Jet', { grid: 'GRID F7', where: 'Zuidelijk dak', text: 'Pak op en activeer eenmaal boven open vijandelijk gebied. Uniek Reactor-armament. Gebruik hem niet als enige poging voor Helo Hat Trick.' }),\n      S('supply', '18/29 Basilisk', { grid: 'GRID G3', text: 'Het huis is gebarricadeerd. Klim op het dak, breek het glazen dakraam en laat je naar binnen vallen.', sub: 'Zware revolver met hoge schade, maar langzaam. Pistol 4/5.' }),\n      S('armament', 'Precision Airstrike', { grid: 'GRID H4', where: 'Voor de grote witte hangar met letter A', text: 'Pak op. Dit wordt armament 1 van 3 voor Helo Hat Trick.' }),\n      S('trophy', 'Helo Hat Trick — heli 1/3', { grid: 'GRID H4', where: 'Noordoostelijke objective-helikopter', text: 'Richt de Precision Airstrike precies over de noordoostelijke objective-helikopter en bevestig. Controleer dat de heli daadwerkelijk door deze strike wordt vernietigd.' }),\n      S('supply', '19/29 Hybrid STB 556', { grid: 'GRID H3', text: 'Bij de noordoostelijke objective-helikopter, aan de noordzijde.', sub: 'Flexibele AR met hybrid optic. AR 4/5.' }),\n      S('supply', '20/29 PILA', { grid: 'GRID H3', text: 'Bij dezelfde noordoostelijke heli, aan de zuidzijde.', sub: 'Lock-on launcher, uitstekend tegen lucht- en voertuigdoelen. Launcher 5/5.' }),\n      S('supply', '21/29 Incendiary MTZ Interceptor', { grid: 'GRID G4', text: 'De kist ligt open op de laadbak van een truck.', sub: 'Sterke semi-auto marksman rifle met brandmunitie. Marksman 4/5.' }),\n      S('supply', '22/29 Anti-Armor Rounds', { grid: 'GRID G4', text: 'Ga de opslagloods in. De field upgrade ligt op een tafel in een oranje kist.', sub: 'Verhoogt schade en penetratie tegen zwaardere doelen. Gadget 4/5.' }),\n      S('trophy', 'Hey, Catch!', { grid: 'GRID G4/G5', where: 'Rode Flammable Canister bij warehouse/heli-gebied', text: 'Pak een rode Flammable Canister. Ga dicht bij een gewone vijand staan, gooi de jerrycan recht tegen hem aan en schiet hem direct kapot. De directe impact én de explosie moeten dezelfde vijand treffen.', trophy: 'catch' }),\n      S('supply', '23/29 Explosive Crossbow', { grid: 'GRID G5', text: 'Parkour of ascender naar het dak. De kist staat aan de noordzijde met zicht op de bouwplaats.', sub: 'Explosieve splash damage, trage reload. Special 3/5.' }),\n      S('supply', '24/29 Incendiary Bryson 800', { grid: 'GRID G6', text: 'Ga het grote gebouw in. De kist staat open en centraal op de begane grond.', sub: 'Hoge schade per schot op korte afstand. Shotgun 4/5.' }),\n      S('supply', '25/29 Signal 50', { grid: 'GRID G6', text: 'Gebruik de ascender naar het dak van hetzelfde gebouw.', sub: 'Zware semi-auto sniper met snelle follow-up. Sniper 4/5.' }),\n      S('supply', '26/29 Silenced Lachmann Sub', { grid: 'GRID G6', text: 'Oostzijde van hetzelfde gebouw, tegen de muur naast grote leidingen.', sub: 'Betrouwbare stille SMG met fijne recoil. SMG 4/5.' }),\n      S('trophy', 'Have You Tried Turning It Off and On?', { grid: 'GRID G6', where: 'Vijandelijke Sentry Gun bij de Fennec-opslagloods', text: 'Benader de Sentry Gun vanuit dekking en gooi je eerder uitgeruste Shock Stick recht tegen de turret. De trofee pop zodra die elektrisch wordt uitgeschakeld.', trophy: 'shock' }),\n      S('supply', '27/29 Fennec 45', { grid: 'GRID G6', text: 'Ga de kleine opslagloods in (let op de vijandelijke Sentry Gun).', sub: 'Extreem hoge vuursnelheid, sterk dichtbij. SMG 4/5.' }),\n      S('supply', '28/29 Holger 26', { grid: 'GRID F7', text: 'Bij de zuidoostelijke objective-helikopter, in het objectivegebied.', sub: 'Mobieler dan zware LMGs, goede controle. LMG 4/5.' }),\n      S('supply', '29/29 Cronen Squall', { grid: 'GRID F7', text: 'Naast de Holger 26 bij dezelfde zuidoostelijke heli.', sub: 'Hoge middellange-afstandsschade met meer recoil dan een AR. Battle rifle 4/5.' }),\n      S('trophy', 'Helo Hat Trick — heli 2/3', { grid: 'GRID G7', where: 'Zuidoostelijke objective-helikopter', text: 'Stuur de bewaarde Cruise Missile recht in de zuidoostelijke objective-helikopter. Dit moet een ander armament zijn dan bij heli 1.' }),\n      S('route', 'Terug naar de Mortar Strike', { grid: 'GRID C5', where: 'Westelijke yard', text: 'Ga terug naar de yard waar je de Mortar Strike markeerde en pak hem nu op.' }),\n      S('trophy', 'Helo Hat Trick — heli 3/3', { grid: 'GRID D4', where: 'Westelijke objective-helikopter', text: 'Gebruik de Mortar Strike op de laatste westelijke objective-helikopter. Met heli 1 (Precision Airstrike) en heli 2 (Cruise Missile) hoort Helo Hat Trick nu te poppen.', trophy: 'helo' }),\n      S('trophy', 'That’s One Way to Do It…', { grid: 'GRID C5', where: 'Na het checkpoint van de derde heli', text: 'Herstart het laatste checkpoint (Mortar Strike ligt weer in de yard). Blijf uit zicht van de vliegende armored helicopter tot die rustig boven het midden hangt en markeer hem met de Mortar Strike. Missen de shells? Herstart hetzelfde checkpoint.', trophy: 'mortar' }),\n      S('finale', 'Eindcontrole + Reactor Room', { grid: 'GRID E5', where: 'Vóór het centrale reactorgebouw', text: 'Pauzemenu: controleer Weapons & Items 29/29 en Armor Slots x3, en dat Stealth Bomber, SAM Turret, Mortar Strike, VTOL en Precision Airstrike elk minstens één keer zijn gebruikt. Ga dan pas de Reactor Room in en voltooi de finale.' }),\n    ];\n    r.m4 = [\n      S('route', 'Recon Drone — scan de basis', { where: 'Start', text: 'Je begint met een Recon Drone. Scan de raketbasis en onthoud de patrouilles én de soldaat met de rode baret — hij draagt de keycard. Verlaat de drone-view als je klaar bent.' }),\n      S('route', 'Sluip via het veld (linkerflank)', { where: 'Open veld → ruïnes', text: 'Als Price: beweeg naar de witte jeep links en neem de linkerflank. Blijf gehurkt of plat in het hoge gras. Let op het kompas — een gele stip betekent dat je opgemerkt wordt, ga dan prone. Werk richting de ruïnes met de vlag.' }),\n      S('trophy', '2-fer', { where: 'Open veld, opgelijnde patrouilles', text: 'Gebruik de suppressed EBR-14. Wacht tot twee soldaten achter elkaar lopen en dood ze met één kogel — 5×, zonder het alarm te activeren. Het openingsveld met patrouillerende paren is de beste plek. Mis je er een? Herstart het checkpoint.', trophy: 'twofer' }),\n      S('route', 'Naar de basis', { where: 'Ruïnes → gebroken muur', text: 'Vanaf de ruïnes ga je naar de dichterbij gelegen gebouwresten. Schakel de soldaten stil uit, daarna het tweetal Konni-soldaten ten noorden. Blijf op de linkerflank tot je bij de gebroken muur komt die naar de basis leidt.' }),\n      S('route', 'Bemachtig de keycard', { where: 'Warehouse aan de overkant', text: 'De bunkeringang is dichtbij, maar de keycard ligt aan de overkant. Ga het warehouse in, schakel de soldaat met de rode baret uit en pak zijn keycard.' }),\n      S('route', 'De silo in', { where: 'Silo-gang → zipline', text: 'Gebruik de keycard, ga door de silo-gang en daal af via de zipline. Onderaan wacht een vuurgevecht — wees voorbereid.' }),\n      S('finale', 'Ontmantel de warhead', { where: 'Raketkamer', text: 'Vecht omhoog naar de raketkamer. Reken af met de Juggernaut-bewaker en ontmantel de warhead om de lancering te voorkomen.' }),\n    ];\n    r.m5 = [\n      S('route', 'Berg je wapen op', { where: 'Start — heuvel', text: 'Je speelt Laswell undercover op een Kastoviaanse basis met een silenced pistol. Berg je wapen op (rechts op de D-pad) en blijf rustig lopen — rennen verraadt je. Doel: bereik het Admin Building (met vlaggen). Daarvoor heb je een keycard nodig.' }),\n      S('route', 'Blend in langs het pad', { where: 'Hoofdpad', text: 'Loop het pad af en vermijd de twee groepen soldaten die je tegemoetkomen: lopen ze links, wijk dan naar rechts; lopen ze rechts, wijk naar links. Te dichtbij komen wekt argwaan — genoeg argwaan = ontdekt = mission failed.' }),\n      S('route', 'Shortcut door de hangar', { where: 'Open hangar/opslag links', text: 'Loop door de hangar/opslag met de open deur aan de linkerkant om patrouilles te ontwijken, en kom er aan de rechterkant weer uit. Vervolg richting het Admin Building.' }),\n      S('route', 'Spot de Majoor', { where: 'Admin-binnenplein', text: 'Op het binnenplein wordt een Russische Majoor door twee bewakers naar buiten geëscorteerd. Zijn bewakers splitsen af; de Majoor loopt de trap op naar het witte container-kantoor tegenover het Admin Building.' }),\n      S('trophy', 'Back in the Field', { where: '<90s vanaf controle', text: 'Snelle route: sprint direct naar de zandzakken vóór je, mantle eroverheen en blijf links van de weg; laat het voertuig passeren. Neem de opslag-shortcut links, ga áchter het witte container-kantoor om en klim de trap op vóór de Majoor. Schakel de soldaat binnen uit, wacht, en geef de Majoor een headshot zodra hij binnenkomt. Pak meteen de keycard. Worden de bewakers daarna gealarmeerd? De trofee telt al — herstart daarna het checkpoint.', trophy: 'back_field' }),\n      S('route', 'Pak de keycard (normaal)', { where: 'Container-kantoor boven', text: 'Volg anders de Majoor de trap op naar de getuigenvrije kamer. Trek je pistol en leg met twee schone headshots zowel de Majoor als de soldaat om, zodat niemand kan schreeuwen. Pak de keycard van de Majoor.' }),\n      S('route', 'Naar Yuri', { where: 'Admin Building', text: 'Ga terug naar beneden en gebruik de keycard op de hoofddeuren van het Admin Building. Loop rechtdoor; Yuri’s kantoor is links. Cutscene — Price waarschuwt voor een inkomende gasraket.' }),\n      S('finale', 'Naar het dak', { where: 'Vlucht na de inslag', text: 'Na de inslag: vlucht naar buiten, ga rechts naar de trap aan het eind, omhoog, dan rechts-links-links de geel verlichte kamer in. Klim de ladders op en naar buiten om de missie te voltooien.' }),\n    ];\n    r.m6 = [\n      S('route', 'Aan boord van Flight 761', { where: 'Cabine', text: 'Cinematische missie. Je speelt Samara op de Russische vlucht naar Sochi. De passagier naast je maakt small talk over je familie en je ULF-verleden.' }),\n      S('route', 'De kaper', { where: 'Stoel', text: 'Hij toont een pistol en bedreigt je. Bij de takedown-prompt ontwapen je hem — of, opvallend genoeg, druk je niets en laat je de air marshals en kapers elkaar bevechten.' }),\n      S('route', 'Zelfverdediging', { where: 'Cabine', text: 'Je wordt gedwongen op de corrupte air marshals te schieten; meer gewapende vijanden vallen aan. Een flashbang schakelt je uit en Konni sleept je naar voren.' }),\n      S('route', 'Makarov', { where: 'Voorin het toestel', text: 'Makarov onthult dat hij de ULF erin luist. Hij gespt een bom op je borst, springt uit het vliegtuig en gooit je een leeg pistool toe; passagiers houden je tegen bij het ontmantelen.' }),\n      S('finale', 'Scripted einde', { text: 'De missie eindigt in een scripted failure — Samara komt om. Een verhaalmoment (No Russian-eerbetoon), geen collectibles of trofee. Speel het uit.' }),\n    ];\n    r.m7 = [\n      S('route', 'Open de eerste Loadout Crate', { text: 'Bevestig een loadout — registreert Crash Site voor Dialed In.' }),\n      S('trophy', 'Frequent Flyer', { where: 'Base jump van hoogte', text: 'Als je hier vanaf hoogte springt: reis meer dan 150m met je parachute in één sprong.', trophy: 'flyer' }),\n      S('armament', 'Alle Armaments', { text: 'Vind en gebruik elk Armament (No Such Thing as Too Many / Sample Platter).' }),\n      S('supply', 'Alle Supply Boxes', { text: 'Verzamel alle wapens & field upgrades (Gearhead).' }),\n      S('plate', 'Plate Carrier Upgrades', { text: 'Vind alle Plate Carrier-vesten (Bulletproof).' }),\n      S('finale', 'Voltooi objectives en exfil', { text: 'Rond de doelen af en bereik de extractie.' }),\n    ];\n    r.m8 = [\n      S('route', 'Werk door de stad', { text: 'Vecht door het stedelijke gebied richting de wapende setState({ store: ns });\n  }\n  addGame(title) {\n    if (!title || !title.trim()) return;\n    const store = this.state.store;\n    const games = store.games.concat([{ id: 'g' + Date.now(), title: title.trim(), sub: 'Eigen game', platform: 'PS5', type: 'custom', accent: '#36c6a0' }]);\n    const ns = Object.assign({}, store, { games });\n    this.persist(ns); this.setState({ store: ns, draftGame: '', addGameOpen: false });\n  }\n\n  allGames() { return this._data.builtinGames.concat(this.state.store.games || []); }\n  gameById(id) { return this.allGames().find(g => g.id === id); }\n\n  customCount(gameId) {\n    const list = this.state.store.custom[gameId] || [];\n    return { done: list.filter(i => i.done).length, total: list.length };\n  }\n\n  mw3Stats() {\n    const store = this.state.store;\n    const trT = this._data.trophies.length;\n    const trD = this._data.trophies.filter(t => store.trophies[t.id]).length;\n    const mT = this._data.missions.length;\n    const mD = this._data.missions.filter(m => store.missions[m.id]).length;\n    let cT = 0, cD = 0;\n    this._data.missions.filter(m => m.type === 'open').forEach(m => {\n      const st = this.routeStats(m.id);\n      cT += st.supply[1] + st.plate[1] + st.armament[1];\n      cD += st.supply[0] + st.plate[0] + st.armament[0];\n    });\n    return { tr: [trD, trT], mi: [mD, mT], co: [cD, cT], all: [trD + mD + cD, trT + mT + cT] };\n  }\n\n  gamePct(g) {\n    if (g.type === 'mw3') {\n      const a = this.mw3Stats().all;\n      return { pct: a[1] ? Math.round(a[0] / a[1] * 100) : 0, done: a[0], total: a[1] };\n    }\n    const c = this.customCount(g.id);\n    return { pct: c.total ? Math.round(c.done / c.total * 100) : 0, done: c.done, total: c.total };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const isLibrary = s.view === 'library';\n    const isGame = s.view === 'game';\n    const isWalk = s.view === 'walkthrough';\n    if (isWalk) return this.walkVals();\n    const goLibrary = () => this.setState({ view: 'library', confirmReset: null });\n\n    // ---------- LIBRARY ----------\n    const libGames = this.allGames().map(g => {\n      const p = this.gamePct(g);\n      return {\n        id: g.id, title: g.title, sub: g.sub, platform: g.platform,\n        accent: g.accent || '#2b9dff', coverId: 'cover_' + g.id,\n        pct: p.pct, pctLabel: p.pct + '%',\n        onOpen: () => this.setState({ view: 'game', gameId: g.id, tab: 'overzicht', expanded: null, confirmReset: null }),\n      };\n    });\n    const trophyTotalDone = this._data.trophies.filter(t => s.store.trophies[t.id]).length;\n\n    const base = {\n      isLibrary, isGame, isWalk: false, goLibrary,\n      libGames, libGameCount: this.allGames().length, libTrophyTotal: trophyTotalDone,\n      addGameOpen: s.addGameOpen, addGameClosed: !s.addGameOpen, draftGame: s.draftGame,\n      onDraftGame: (e) => this.setState({ draftGame: e.target.value }),\n      onAddGame: () => this.addGame(s.draftGame),\n      onToggleAddGame: () => this.setState({ addGameOpen: !s.addGameOpen, draftGame: '' }),\n    };\n    if (!isGame) return base;\n\n    // ---------- GAME ----------\n    const g = this.gameById(s.gameId) || this._data.builtinGames[0];\n    const p = this.gamePct(g);\n    const gIsMw3 = g.type === 'mw3';\n\n    const tabDefs = gIsMw3\n      ? [['overzicht', 'Overzicht', '▦'], ['trofeeen', 'Trofeeën', '★'], ['missies', 'Missies', '⚑'], ['verzamel', 'Verzamel', '◈'], ['notities', 'Notities', '✎']]\n      : [['overzicht', 'Overzicht', '▦'], ['checklist', 'Checklist', '✓'], ['notities', 'Notities', '✎']];\n    const tabs = tabDefs.map(([key, label, glyph]) => {\n      const active = s.tab === key;\n      return {\n        key, label, glyph,\n        onClick: () => this.setState({ tab: key, expanded: null, confirmReset: null }),\n        iconStyle: active ? 'color:#2b9dff;' : 'color:#566177;',\n        labelStyle: active ? 'color:#e9eef7;' : 'color:#566177;',\n      };\n    });\n\n    const out = Object.assign({}, base, {\n      gId: g.id, gTitle: g.title, gSub: g.sub, gPlatform: g.platform,\n      gIsMw3, gIsCustom: !gIsMw3, gAccent: g.accent || '#2b9dff', gCoverId: 'cover_' + g.id,\n      gPct: p.pct, gPctLabel: p.pct + '%',\n      gProgressText: gIsMw3 ? (p.done + ' / ' + p.total + ' voltooid') : (p.total ? p.done + ' / ' + p.total + ' items' : 'Nog geen items'),\n      tabs, tab: s.tab,\n      showOverzicht: s.tab === 'overzicht',\n      showTrofeeen: s.tab === 'trofeeen',\n      showMissies: s.tab === 'missies',\n      showVerzamel: s.tab === 'verzamel',\n      showChecklist: s.tab === 'checklist',\n      showNotities: s.tab === 'notities',\n      notesVal: (s.store.notes[g.id] || ''),\n      onNotes: (e) => this.setNote('notes', g.id, e.target.value),\n    });\n\n    const cr = s.confirmReset;\n    out.onResetCancel = () => this.cancelReset();\n    out.onResetConfirm = () => this.doReset();\n    out.onResetTrophies = () => this.requestReset('trophies');\n    out.onResetMissions = () => this.requestReset('missions');\n    out.onResetCollect = () => this.requestReset('collect');\n    out.onResetChecklist = () => this.requestReset('checklist');\n    out.onResetGame = () => this.requestReset('game');\n    out.pendTrophies = cr === 'trophies'; out.notPendTrophies = cr !== 'trophies';\n    out.pendMissions = cr === 'missions'; out.notPendMissions = cr !== 'missions';\n    out.pendCollect = cr === 'collect'; out.notPendCollect = cr !== 'collect';\n    out.pendChecklist = cr === 'checklist'; out.notPendChecklist = cr !== 'checklist';\n    out.pendGame = cr === 'game'; out.notPendGame = cr !== 'game';\n\n    // Overview — grade breakdown & categories\n    if (s.tab === 'overzicht' && gIsMw3) {\n      const grades = ['platinum', 'gold', 'silver', 'bronze'];\n      out.ovGrades = grades.map(gr => {\n        const list = this._data.trophies.filter(t => t.grade === gr);\n        const done = list.filter(t => s.store.trophies[t.id]).length;\n        return { label: done + '/' + list.length, name: this.GRADE[gr].label, color: this.GRADE[gr].color, glow: this.GRADE[gr].glow };\n      });\n      const parts = [['Trofeeën', this.mw3Stats().tr, '#f0c14b'], ['Missies', this.mw3Stats().mi, '#5ab8ff'], ['Verzamelingen', this.mw3Stats().co, '#36c6a0']];\n      out.ovCats = parts.map(([label, pair, color]) => {\n        const done = pair[0], total = pair[1];\n        return { label, color, done, total, text: done + '/' + total, pct: total ? Math.round(done / total * 100) : 0 };\n      });\n      const firstTodo = this._data.trophies.find(t => t.area !== 'platinum' && !s.store.trophies[t.id]);\n      out.ovNext = firstTodo ? ('Werk toe naar “' + firstTodo.name + '” — ' + firstTodo.desc) : 'Alles behaald — tijd voor de platina! 🏆';\n    }\n\n    // Trophies tab\n    if (s.tab === 'trofeeen') {\n      const filters = [['all', 'Alle'], ['campaign', 'Campagne'], ['open', 'Open Combat'], ['zombies', 'Zombies'], ['todo', 'Te doen'], ['done', 'Behaald']];\n      out.trFilters = filters.map(([key, label]) => {\n        const active = s.trFilter === key;\n        return {\n          key, label,\n          onClick: () => this.setState({ trFilter: key }),\n          style: active ? 'background:#2b9dff;color:#05111f;' : 'background:#161b29;color:#9aa2b5;border:1px solid rgba(255,255,255,0.08);',\n        };\n      });\n      out.trQuery = s.trQuery;\n      out.onTrQuery = (e) => this.setState({ trQuery: e.target.value });\n      const q = s.trQuery.trim().toLowerCase();\n      let list = this._data.trophies.slice();\n      if (s.trFilter === 'todo') list = list.filter(t => !s.store.trophies[t.id]);\n      else if (s.trFilter === 'done') list = list.filter(t => s.store.trophies[t.id]);\n      else if (s.trFilter !== 'all') list = list.filter(t => t.area === s.trFilter);\n      if (q) list = list.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q));\n      out.trItems = list.map(t => {\n        const done = !!s.store.trophies[t.id];\n        const gr = this.GRADE[t.grade], ar = this.AREA[t.area];\n        const open = s.expanded === t.id;\n        return {\n          id: t.id, name: t.name, desc: t.desc, done,\n          gradeColor: gr.color, gradeGlow: gr.glow,\n          areaLabel: ar.label, areaColor: ar.color, areaBg: ar.bg,\n          onToggle: () => this.toggleField('trophies', t.id),\n          onExpand: () => this.setState(st => ({ expanded: st.expanded === t.id ? null : t.id })),\n          isOpen: open,\n          checkStyle: done ? 'border-color:#2b9dff;background:#2b9dff;' : 'border-color:rgba(255,255,255,0.22);background:transparent;',\n          nameStyle: done ? 'color:#7f8aa0;text-decoration:line-through;' : 'color:#eef1f7;',\n          cardStyle: done ? 'opacity:0.72;' : '',\n          photoId: 'tphoto_' + t.id,\n          note: (s.store.itemNotes['t_' + t.id] || ''),\n          onNote: (e) => this.setNote('itemNotes', 't_' + t.id, e.target.value),\n        };\n      });\n    }\n\n    // Missions tab\n    if (s.tab === 'missies') {\n      const mdone = this._data.missions.filter(m => s.store.missions[m.id]).length;\n      out.mProgressText = mdone + ' / ' + this._data.missions.length + ' missies voltooid';\n      out.mHideDone = s.mHideDone;\n      out.mHideStyle = s.mHideDone ? 'background:#2b9dff;color:#05111f;' : 'background:#161b29;color:#9aa2b5;border:1px solid rgba(255,255,255,0.08);';\n      out.onToggleHideDone = () => this.setState({ mHideDone: !s.mHideDone });\n      let ms = this._data.missions.slice();\n      if (s.mHideDone) ms = ms.filter(m => !s.store.missions[m.id]);\n      out.mItems = ms.map(m => {\n        const done = !!s.store.missions[m.id];\n        const isOpen2 = m.type === 'open';\n        const goalDef = this.GOALS[m.id] || { tr: 0 };\n        const stats = this.routeStats(m.id);\n        const tr = goalDef.tr || 0;\n        const trophyChipText = tr > 0 ? (tr + (tr === 1 ? ' trophy' : ' trophies')) : 'Story';\n        const trophyChipStyle = tr > 0\n          ? 'color:#f0c14b;background:rgba(240,193,75,0.12);'\n          : 'color:#8b93a8;background:rgba(255,255,255,0.06);';\n        return {\n          id: m.id, n: m.n, title: m.title, goal: this.MGOAL[m.id] || m.loc, done,\n          typeLabel: isOpen2 ? 'OPEN' : 'LINEAIR',\n          typeColor: isOpen2 ? '#36c6a0' : '#8b93a8',\n          typeBg: isOpen2 ? 'rgba(54,198,160,0.13)' : 'rgba(255,255,255,0.06)',\n          trophyChip: trophyChipText, trophyChipStyle,\n          hasColl: !!goalDef.coll, collChip: goalDef.coll || '',\n          routeText: stats.done + '/' + stats.total,\n          routePct: stats.total ? Math.round(stats.done / stats.total * 100) : 0,\n          onToggle: () => this.toggleField('missions', m.id),\n          onOpen: () => this.openWalk(m.id),\n          checkStyle: done ? 'border-color:#2b9dff;background:#2b9dff;' : 'border-color:rgba(255,255,255,0.22);background:transparent;',\n          nameStyle: done ? 'color:#7f8aa0;' : 'color:#eef1f7;',\n          cardStyle: done ? 'opacity:0.78;' : '',\n        };\n      });\n    }\n\n    // Collectibles tab\n    if (s.tab === 'verzamel') {\n      const ocms = this._data.missions.filter(m => m.type === 'open');\n      out.cGroups = ocms.map(m => {\n        const st = this.routeStats(m.id);\n        const rows = [];\n        if (st.supply[1]) rows.push({ label: 'Weapons & Items', text: st.supply[0] + '/' + st.supply[1] });\n        if (st.plate[1]) rows.push({ label: 'Plate Carriers', text: st.plate[0] + '/' + st.plate[1] });\n        if (st.armament[1]) rows.push({ label: 'Armaments', text: st.armament[0] + '/' + st.armament[1] });\n        if (st.trophy[1]) rows.push({ label: 'Trophies', text: st.trophy[0] + '/' + st.trophy[1] });\n        return {\n          id: m.id, title: m.title, sub: 'Open Combat · ' + (this.MGOAL[m.id] || ''),\n          pct: st.total ? Math.round(st.done / st.total * 100) : 0,\n          text: st.done + '/' + st.total,\n          rows, onOpen: () => this.openWalk(m.id),\n        };\n      });\n      const cc = s.store.custom['mw3'] || [];\n      out.ccItems = cc.map(it => ({\n        id: it.id, label: it.label, done: it.done,\n        onToggle: () => this.toggleCustom('mw3', it.id),\n        onRemove: () => this.removeCustom('mw3', it.id),\n        checkStyle: it.done ? 'border-color:#2b9dff;background:#2b9dff;' : 'border-color:rgba(255,255,255,0.22);background:transparent;',\n        labelStyle: it.done ? 'color:#7f8aa0;text-decoration:line-through;' : 'color:#dce1ec;',\n      }));\n      out.draftCollect = s.draftCollect;\n      out.onDraftCollect = (e) => this.setState({ draftCollect: e.target.value });\n      out.onAddCollect = () => this.addCustom('mw3', s.draftCollect, 'draftCollect');\n    }\n\n    // Checklist tab (custom game)\n    if (s.tab === 'checklist') {\n      const cl = s.store.custom[g.id] || [];\n      out.clItems = cl.map(it => ({\n        id: it.id, label: it.label, done: it.done,\n        onToggle: () => this.toggleCustom(g.id, it.id),\n        onRemove: () => this.removeCustom(g.id, it.id),\n        checkStyle: it.done ? 'border-color:#2b9dff;background:#2b9dff;' : 'border-color:rgba(255,255,255,0.22);background:transparent;',\n        labelStyle: it.done ? 'color:#7f8aa0;text-decoration:line-through;' : 'color:#eef1f7;',\n      }));\n      out.clEmpty = cl.length === 0;\n      out.draftChecklist = s.draftChecklist;\n      out.onDraftChecklist = (e) => this.setState({ draftChecklist: e.target.value });\n      out.onAddChecklist = () => this.addCustom(g.id, s.draftChecklist, 'draftChecklist');\n    }\n\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
